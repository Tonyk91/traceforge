name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,mcp]"

      - name: Lint (ruff)
        run: ruff check src tests eval

      - name: Tests
        run: pytest -q

      - name: Golden-set eval gate
        run: python -m eval.runner
